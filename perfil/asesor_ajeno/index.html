<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="/resources/JS/cargarPerfil.js"></script>

    <title>Perfil</title>

    <style>

        /* dialog */
        dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: none;
            border-radius: 10px;
            padding: 20px;
        }

        /* header ahora normal */
        .perfil-header {
            background-color: #65107d;
            padding: 1.5rem;
            border-radius: 10px 10px 0 0;
        }

        .perfil-header h5 {
            color: white;
            font-weight: bold;
        }

        /* imagen */
        .perfil-container {
            position: relative;
            width: 150px;
        }

        .perfil-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid #ccc;
        }

        /* scroll materias */
        .scroll-container {
            max-height: 250px;
            overflow-y: auto;
            background-color: #e9e9e9;
            border-radius: 15px;
            padding: 15px;
        }

        .materia-card {
            background-color: #690869;
            color: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            font-weight: bold;
            border-bottom: 5px solid #683265;
            transition: transform 0.2s;
        }

        .materia-card:hover {
            transform: scale(1.02);
            background-color: #852285;
        }

        .scroll-container::-webkit-scrollbar {
            width: 8px;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .card-custom {
            border-radius: 15px;
            overflow: hidden;
        }

        .card-body {
            background-color: #6a0dad;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="card shadow-lg">

            <!-- HEADER -->
            <div class="perfil-header">
                <h5>Perfil del Asesor</h5>
            </div>

            <!-- BODY -->
            <div class="p-4">

                <div class="row align-items-center">

                    <!-- FOTO -->
                    <!--foto de perfil-->
                    <div class="col-auto">
                        <div class="perfil-container m-0"> <img id="imagenPerfil" class="perfil-img">

                            <input type="file" id="inputFile" hidden>


                            
                        </div>
                    </div>

                    <!-- DATOS -->
                    <div class="col">
                        <h2 class="fw-bold mb-1 " id="nombreAlumno"></h2>
                        <p class="text-muted fs-5" id="carerraPerfil">Estudiante de Programación</p>
                        <span class="badge bg-primary" id="tipoPerfil">Asesor</span>
                    </div>

                </div>


                <hr class="my-4">

                <!-- MATERIAS -->
                <div id="contenedor"></div>
                <!-- COMUNICACIÓN -->
                <h4 class="mb-3">Comunicación</h4>

                <div class="row row-cols-1 row-cols-md-3 g-3">

                    <div class="col">
                        <div class="mb-2">
                            <i class="bi bi-whatsapp me-2"></i>
                            <a href="#" class="text-dark" id="telefonoPerfil">+52 (614) 358-3700</a>
                        </div>
                        <div>
                            <i class="bi bi-discord me-2"></i>
                            <a href="#" class="text-dark" id="idDiscord">642599840110608405</a>
                        </div>
                    </div>

                    <div class="col">
                        <div>
                            <i class="bi bi-instagram me-2"></i>
                            <a href="#" class="text-dark" id="igPerfil">@ajusa._</a>
                        </div>
                    </div>

                    <div class="col">
                        <i class="bi bi-twitter me-2"></i>
                        <a href="#" class="text-dark" id="twitterPerfil">@F.Morgan</a>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="text-end mt-4">

                    <dialog id="ms">
                        <p class="text-center">¡La cuenta ha sido reportada con éxito!</p>
                        <div class="text-center">
                            <button id="cerrar" class="btn btn-danger">Cerrar</button>
                        </div>
                    </dialog>

<!-- OVERLAY -->
    <div id="overlay" style="
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background-color: #363940;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        
    ">
        <img src="imagen/popo.png" alt="Reportegato" style="
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        "
        >
        
    <div style="
    position: 
    relative; 
    z-index: 10; 
    align-self: 
    flex-start;">
        <a href="/ProyectoInvestigacion/index.html" class="btn-animado w-100 text-start text-white ">← Regresar</a>
    </div>

    <div style="
    position: relative; 
    z-index: 10; 
    text-align:center; 
    margin-top: auto; 
    padding-bottom: 40px;">
        <h2 style="color: white; font-weight: bold; font-size: clamp(1.8rem, 4vw, 3.5rem); margin-bottom: 0;">Whoops...</h2>
        <p style="color: #ccc; font-size: clamp(1rem, 2vw, 1.5rem);">Este perfil no está disponible.</p>
    </div>
</div>

                    <button id="show1" class="btn btn-danger">
                        Reportar perfil
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>

        const input = document.getElementById("inputFile");
        const imagen = document.getElementById("imagenPerfil");

        /* Cargar imagen guardada */
        window.onload = function () {
            const guardada = localStorage.getItem("fotoPerfil");
            if (guardada) {
                imagen.src = guardada;
            }
        };

        /* Cambiar imagen */
        input.addEventListener("change", function () {
            const archivo = this.files[0];

            if (archivo) {
                const reader = new FileReader();

                reader.onload = function (e) {
                    imagen.src = e.target.result;

                    // Guardar en localStorage
                    localStorage.setItem("fotoPerfil", e.target.result);
                }

                reader.readAsDataURL(archivo);
            }
        });


        // botón reportar
        window.addEventListener("load", function () {

            let mensaje = document.getElementById('ms');
            let btn = document.getElementById("show1");
            let overlay = document.getElementById("overlay");

            btn.addEventListener("click", function () {
                mensaje.showModal();
            });

            document.getElementById("cerrar").addEventListener("click", function () {
                mensaje.close();

                 overlay.style.display = "flex";
            });

        });

    </script>

</body>

</html>
