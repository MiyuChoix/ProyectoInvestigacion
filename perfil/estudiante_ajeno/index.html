   <style>
    
/*estilo del dialogo que sale cunado se reporta el perfil*/     
  dialog {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  margin: auto;
  border: none;
  border-radius: 10px;
  padding: 20px;
}
/* pinta la parte superior del modal */
.modal-header {
    background-color: #65107d;
    border-bottom: none;
    padding: 1.5rem; 
}

/*color del texto y el botón de cerrar */
.modal-header .modal-title {
    color: white !important;
    font-weight:bold;
}

.perfil-container{
  position: relative;
  width: 150px;
  margin: auto;
}

.perfil-img{
  width: 150px;
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;
  border: 3px solid #ccc;
}

.cambiar{
  position: absolute;
  bottom: 0;
  right: 0;
  background: #000;
  color: #fff;
  border-radius: 50%;
  padding: 5px 8px;
  cursor: pointer;
  font-size: 14px;
}


/* Estilo de las cards de materias */
.materia-card {
    background-color: #690869; 
    color: white;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 10px;
    font-weight: bold;
    border-bottom: 5px solid #683265; /* sombra inferior de la card*/
    transition: transform 0.2s;
}

.materia-card:hover {
    transform: scale(1.02);
    background-color: #852285;
}

   </style>
<!--==========================================FIN DEL ESTILOOOOOOOOOOO========================================================-->   


</head>

    <script>
        const input = document.getElementById("inputFile");
        const imagen = document.getElementById("imagenPerfil");

//carga imagen guardada
window.onload = function() {
  const guardada = localStorage.getItem("fotoPerfil");
  if (guardada) {
    imagen.src = guardada;
  }
};

// boton reportar

window.addEventListener("load", function() {
            let mensaje = document.getElementById('ms');
            let obj_btn1 = document.getElementById("show1");
           obj_btn1.addEventListener("click", function(){
             mensaje.close();
            mensaje.showModal();

           });
