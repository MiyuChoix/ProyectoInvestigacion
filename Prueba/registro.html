<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <title>Registro</title>

    <style>

        body {
            background: linear-gradient(135deg, #6a0dad, #b19cd9); /* este hay que checarlo no jala bien */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

       .card {
    background: rgba(255, 255, 255, 0.85);
    border-radius: 25px;
    padding: 35px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}
        h2, label {
            color: #6a0dad; /* MORADO */
        }

       .btn-purple { /*boton */
            background-color: #6a0dad;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-purple:hover { /* ANIMACIOOOOON DEL BOTONSILLO */
            background-color: #5a0099;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .top-buttons {  /* espacio entre botones */
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .circle-btn { /*pa que los botones sean redondos */
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background-color: #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .circle-btn:hover {  /* interactuar con el boton redondo */
            background-color: #d1b3ff;
            transform: scale(1.05);
        }

        .circle-btn.active {
    background-color: #6a0dad;
}

.circle-btn.active i,
.circle-btn.active span {
    color: white;
}

        .circle-btn i {
            font-size: 24px;
            color: #6a0dad;
        }

        .circle-btn span {
            font-size: 12px;
            color: #6a0dad;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 8px;
            cursor: pointer;
        }

          .extra-links {
            font-size: 14px;
        }

        .extra-links a {
            color: #6a0dad;
            text-decoration: none;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card bg-white">

    <h2 class="text-center mb-3">Sign In</h2><br>

    <!-- BOTONES SUPERIORES -->
    <div class="top-buttons">
    <button type="button" class="circle-btn" id="asesorBtn" onclick="seleccionarRol('asesor')">
        <i class="bi bi-person-workspace"></i>
        <span>Asesor</span>
    </button>

    <button type="button" class="circle-btn" id="alumnoBtn" onclick="seleccionarRol('alumno')">
        <i class="bi bi-mortarboard"></i>
        <span>Alumno</span>
    </button>
</div>

<!-- input oculto para guardar selección -->
<input type="hidden" name="rol" id="rol">
    <!-- FORMULARIO -->
    <form>
        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" class="form-control" placeholder="Ingrese su nombre" required>
        </div>

        <div class="mb-3">
            <label>Apellido</label>
            <input type="text" class="form-control" placeholder="Ingrese su apellido" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" placeholder="@example.com" required>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <div class="password-container">
                <input 
                    type="password" 
                    id="password" 
                    class="form-control"
                    placeholder="Ingrese una contraseña"
                    required
                    minlength="8"
                    maxlength="30"
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+={}\[\]:;<>,.?/~`]).{8,30}$"
                >
                <span class="toggle-password" onclick="togglePassword()">
                    <i class="bi bi-eye"></i>
                </span>
            </div>
            <small class="text-muted">Debe tener mayúscula, número y símbolo</small>
        </div>

        

        <div class="d-grid">
            <button type="submit" class="btn btn-purple" onclick="window.location.href='index.html'">Registrarse</button>
        </div>

        <div class="text-center extra-links">
            <br>
            <span>Ya tienes una cuenta? <a href="login.html">Inicia sesion</a></span>
        </div>


    </form>
</div>

<!--JS para los botones para que se selecione solo uno-->
<script>
function seleccionarRol(rol) {
    let asesorBtn = document.getElementById("asesorBtn");
    let alumnoBtn = document.getElementById("alumnoBtn");
    let inputRol = document.getElementById("rol");

    //quita selección previa
    asesorBtn.classList.remove("active");
    alumnoBtn.classList.remove("active");

    //activa el seleccionado
    if (rol === "asesor") {
        asesorBtn.classList.add("active");
    } else {
        alumnoBtn.classList.add("active");
    }

    //guardar el valor
    inputRol.value = rol;
}


function registrar() {
   //dirige al index por el momento no funciona xd
    window.location.href = "index.html";
}


<button class="btn btn-purple" onclick="registrar()">Registrarse</button>
</script>
</body>
</html>
