<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>index</title>
    <style>
        .navbar-custom {
            background: linear-gradient(90deg, #6a0dad, #8a2be2);
        }

        .search-box {
            max-width: 500px;
            margin: 20px auto;
        }

        .search-input {
            border-radius: 25px 0 0 25px;
            border: 1px solid #ccc;
        }

        .search-btn {
            border-radius: 0 25px 25px 0;
            background-color: #6a0dad;
            color: white;
        }

        .nav-link.active {
            border-bottom: 2px solid white;
        }

        .profile-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }

        .navbar-collapse .container-fluid {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-custom {
            border-radius: 15px;
            overflow: hidden;
        }

        .btn-primary {
            background-color: #6a0dad;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 20px;
        }

        .card-footer-custom {
            background-color: #6a0dad;
            height: 25px;
        }

        .btn-primary:hover {
            background-color: #8a2be2;
            color: white;

        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-sm navbar-dark navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Logo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav me-auto ms-4">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Mis sesiones</a>
                    </li>
                </ul>
                <div>
                    <a class="navbar-brand" href="#">
                        <img src="/img/image.png" class="profile-img">
                    </a>
                </div>
            </div>
        </div>
    </nav>
    <div class="search-box">
        <div class="input-group">
            <input class="form-control search-input  me-2" type="text" placeholder="Buscar materias, calculo, fisica">
            <button class="btn btn-primary search-btn" type="button">Buscar</button>
        </div>
    </div>
    <hr>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold">Materias</h5>
        </div>

        <div id="contenedorMaterias" class="row g-3 mb-4">
            <!-- la clase "col-md-#" es la que controla cuantos elementos van dentro de las columnas antes de cambiar de linea.
                         bootstrap utiliza un sistema de 12 columnas para colocar sus elementos, asi que colocando un valor de 4 se haria
                         el calculo 12/4 y terminaria con 3 elementos por fila.-->
            <div class="col-md-4">
                <div class="card card-custom">
                    <a href="#" class="btn btn-primary">Materia de ejemplo</a>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalAsesores" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Título del Modal</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div id="modalCuerpo" class="modal-body">

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button class="btn btn-primary">Guardar</button>
                </div>

            </div>
        </div>
    </div>
</body>

<script src="/cositas/Asesorias/resources/js/cargarMaterias.js"></script>

</html>
