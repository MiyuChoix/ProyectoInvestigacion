<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Perfil del Asesor</title>

<style>
body {
    background: linear-gradient(135deg, #6a0dad, #b19cd9);
    min-height: 100vh;
}

.profile-side {
    background: linear-gradient(135deg, #6a0dad, #8a2be2);
    color: white;
    text-align: center;
    padding: 30px;
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid white;
}

.tag {
    background: #8a2be2;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    margin: 5px;
    display: inline-block;
}
</style>

</head>
<body>

<div class="container py-5">

    <h2 class="text-center text-white mb-4">EduConnect - Perfil del Asesor</h2>

    <div class="card shadow-lg rounded-4">
        <div class="row g-0">

            <!-- IZQUIERDA -->
            <div class="col-md-4 profile-side">
                <img src="https://i.pravatar.cc/150" class="profile-img mb-3">
                <h4 id="nombre">María Fernández</h4>
                <p id="carrera">Ingeniería en Sistemas</p>
                <p>⭐ 4.9</p>

                <button class="btn btn-light w-100 mb-2" data-bs-toggle="modal" data-bs-target="#editarModal">
                    ✏️ Editar perfil
                </button>

                <button class="btn btn-success w-100">WhatsApp</button>
            </div>

            <!-- DERECHA -->
            <div class="col-md-8 p-4">

                <div class="mb-4">
                    <h5>📚 Materias</h5>
                    <span class="tag">Matemáticas</span>
                    <span class="tag">Física</span>
                    <span class="tag">Programación</span>
                </div>

                <div class="mb-4">
                    <h5>📌 Información</h5>
                    <p><b>Email:</b> <span id="email">maria@email.com</span></p>
                    <p><b>Teléfono:</b> <span id="telefono">614-123-4567</span></p>
                </div>

            </div>

        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="editarModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Perfil</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="text" id="inputNombre" class="form-control mb-2" placeholder="Nombre">
        <input type="text" id="inputCarrera" class="form-control mb-2" placeholder="Carrera">
        <input type="email" id="inputEmail" class="form-control mb-2" placeholder="Email">
        <input type="text" id="inputTelefono" class="form-control mb-2" placeholder="Teléfono">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="guardarDatos()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function guardarDatos() {
    document.getElementById("nombre").innerText = document.getElementById("inputNombre").value;
    document.getElementById("carrera").innerText = document.getElementById("inputCarrera").value;
    document.getElementById("email").innerText = document.getElementById("inputEmail").value;
    document.getElementById("telefono").innerText = document.getElementById("inputTelefono").value;
}
</script>

</body>
</html>
