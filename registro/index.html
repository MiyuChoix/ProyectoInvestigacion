<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <title>Registro</title>

    <style>
        body {
            background: linear-gradient(135deg, #6a0dad, #b19cd9);
            /* este hay que checarlo no jala bien */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 25px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        h2,
        label {
            color: #6a0dad;
            /* MORADO */
        }

        .btn-purple {
            /*boton */
            background-color: #6a0dad;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-purple:hover {
            /* ANIMACIOOOOON DEL BOTONSILLO */
            background-color: #5a0099;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .top-buttons {
            /* espacio entre botones */
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .circle-btn {
            /*pa que los botones sean redondos */
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background-color: #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .circle-btn:hover {
            /* interactuar con el boton redondo */
            background-color: #d1b3ff;
            transform: scale(1.05);
        }

        .circle-btn.active {
            background-color: #6a0dad;
        }

        .circle-btn.active i,
        .circle-btn.active span {
            color: white;
        }

        .circle-btn i {
            font-size: 24px;
            color: #6a0dad;
        }

        .circle-btn span {
            font-size: 12px;
            color: #6a0dad;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 8px;
            cursor: pointer;
        }

        .extra-links {
            font-size: 14px;
        }

        .extra-links a {
            color: #6a0dad;
            text-decoration: none;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        /* sobreposicion, pantalla completa */
        .sobreposicion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Oculto */
        .hidden {
            display: none;
        }

        /* Caja del modal */
        .modal-box {
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
        }

        /* Barra */
        .progress-container {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: purple;
            transition: width 2s linear;
        }

        /* estilo del select */
        .form-select:focus {
    border-color: #6a0dad;
    box-shadow: 0 0 0 0.2rem rgba(106, 13, 173, 0.25);
}
    </style>
</head>

<body>

    <div class="card bg-white">

        <h2 class="text-center mb-3">Sign In</h2><br>

        <!-- BOTONES SUPERIORES -->
        <div class="top-buttons">
            <button type="button" class="circle-btn" id="asesorBtn" onclick="seleccionarRol('asesor')">
                <i class="bi bi-person-workspace"></i>
                <span>Asesor</span>
            </button>

            <button type="button" class="circle-btn" id="alumnoBtn" onclick="seleccionarRol('alumno')">
                <i class="bi bi-mortarboard"></i>
                <span>Alumno</span>
            </button>
        </div>

        <!-- input oculto para guardar selección -->
        <input type="hidden" name="rol" id="rol">
        <!-- FORMULARIO -->
        <form id="form">
            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ingrese su nombre" required>
            </div>

            <div class="mb-3">
                <label>Apellidos</label>
                <input type="text" id="apellidos" class="form-control" placeholder="Ingrese su apellido" required>
            </div>

            <div class="mb-3">
    <label>Carrera</label>
    <select id="carrera" class="form-select" required>
        <option value="" disabled selected>Seleccione una carrera</option>
        <option value="ISC">Ing. Sistemas Computacionales</option>
        <option value="IIA">Ing. Industrial</option>
        <option value="IINF">Ing. Informatica</option>
    </select>
</div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="correo" class="form-control" placeholder="@chihuahua2.tecnm.mx" required>
            </div>

            <div class="mb-3">
                <label>Contraseña</label>
                <div class="password-container">
                    <input type="password" id="password" class="form-control" placeholder="Ingrese una contraseña"
                        required minlength="8" maxlength="30"
                        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,30}$">
                    <span class="toggle-password" onclick="togglePassword(event)">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
                <small class="text-muted">Debe tener mayúscula, número y símbolo</small>
            </div>
            <div class="mb-3">
                <label>Confirmar contraseña</label>
                <div class="password-container">
                    <input type="password" id="passConfirm" class="form-control" placeholder="Repita la contraseña"
                        required minlength="8" maxlength="30">
                    <span class="toggle-password" onclick="togglePassword(event)">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
            </div>



            <div class="d-grid">
                <button type="submit" class="btn btn-purple">Registrarse</button>
            </div>

            <div class="text-center extra-links">
                <br>
                <span>Ya tienes una cuenta? <a href="../login/index.html">Inicia sesion</a></span>
            </div>


        </form>
    </div>

    <div id="sobreposicion" class="sobreposicion hidden">
        <div class="modal-box">
            <h4>Se agregó el usuario</h4>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <small>Redirigiendo a la pantalla principal...</small>
        </div>
    </div>

    <!-- JS para los botones para que se selecione solo uno, para alternar la visibilidad de la contrasena y para mostrar la sobreposicion de registro exitoso -->
    <script>
        function seleccionarRol(rol) {
            let asesorBtn = document.getElementById("asesorBtn");
            let alumnoBtn = document.getElementById("alumnoBtn");
            let inputRol = document.getElementById("rol");

            //quita selección previa
            asesorBtn.classList.remove("active");
            alumnoBtn.classList.remove("active");

            //activa el seleccionado
            if (rol === "asesor") {
                asesorBtn.classList.add("active");
            } else {
                alumnoBtn.classList.add("active");
            }

            //guardar el valor
            inputRol.value = rol;
        }

        function togglePassword(event) {
            let input = event.target.closest('.password-container').querySelector('input');
            if (input.type === "password") {
                input.type = "text";
                event.target.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = "password";
                event.target.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        function registroExitoso() {
            const sobreposicion = document.getElementById("sobreposicion");
            const bar = document.getElementById("progressBar");

            sobreposicion.classList.remove("hidden");

            // Forzar reflow para que la animación funcione
            bar.style.width = "0%";
            bar.offsetHeight;

            // Inicia animación
            bar.style.width = "100%";

            // Redirigir después de 2 segundos
            setTimeout(() => {
                window.location = "/cositas/Asesorias";
            }, 2000);
        }
    </script>
    <script src="/cositas/Asesorias/resources/js/register.js"></script>
</body>

</html>
