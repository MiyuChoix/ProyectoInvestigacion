<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Inicio</title>


    <!--PAGINA ADICIONAL-->

    <style>
            body {
            background: linear-gradient(135deg, #6a0dad, #b19cd9);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

       .card {
    background: rgba(255, 255, 255, 0.85);
    border-radius: 25px;
    padding: 35px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

        h1 {
            color: #6a0dad;
            font-weight: bold;
        }

        p {
            color: #561162;
            margin-bottom: 25px;
        }

        .btn-purple {
            background-color: #6a0dad;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-purple:hover {
            background-color: #5a0099;
            transform: translateY(-2px);
        }

        .btn-outline-purple {
            border: 2px solid #6a0dad;
            color: #6a0dad;
            border-radius: 15px;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-outline-purple:hover {
            background-color: #6a0dad;
            color: white;
        }
    </style>
</head>

<body>
    <div class="card">

        <h1 class="text-center">¡Bienvenido!</h1>
        <p>Accede a tu cuenta o crea una nueva para comenzar</p>

        <div class="d-grid gap-3">
            <a href="/cositas/Asesorias/login/" class="btn btn-purple">Iniciar Sesión</a>
            <a href="/cositas/Asesorias/registro/" class="btn btn-outline-purple">Crear Cuenta</a>
        </div>

    </div>

</body>
</html>
