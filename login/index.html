<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <title>Login</title>

    <style>
           body {
            background: linear-gradient(135deg, #6a0dad, #b19cd9);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

       .card {
    background: rgba(255, 255, 255, 0.85);
    border-radius: 25px;
    padding: 35px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}
        h2, label {
            color: #6a0dad;
            font-weight: 600;
        }

        .form-control {
            border-radius: 12px;
            transition: 0.3s;
        }

        .form-control:focus { /* sombra de las cajitas de texto */
            border-color: #6a0dad;
            box-shadow: 0 0 8px rgba(106, 13, 173, 0.4);
        }

        .btn-purple { /*boton */
            background-color: #6a0dad;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-purple:hover { /* ANIMACIOOOOON DEL BOTONSILLO */
            background-color: #5a0099;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .password-container { /* POSICION DEL OJO (no jala)*/
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 8px;
            cursor: pointer;
        }

        .extra-links {
            font-size: 14px;
        }

        .extra-links a {
            color: #6a0dad;
            text-decoration: none;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>


    
<div class="card">

    <h2 class="text-center">Login</h2>
    <p class="text-center text-muted">Ingresa a tu cuenta</p>

    <form id="form">

        <div class="mb-3">
            <label>Email</label>
            <input id="correo" type="email" class="form-control" placeholder="@chihuahua2.tecnm.mx" required>
        </div>

         <div class="mb-3">
            <label>Contraseña</label>
            <div class="password-container">
                <input 
                    type="password" 
                    id="password" 
                    class="form-control"
                    placeholder="Ingrese una contraseña"
                    required
                    minlength="8"
                    maxlength="30"
                >
               <span class="toggle-password" onclick="togglePassword()">
                    <i id="icono" class="bi bi-eye"></i>
                </span>
            </div>
            <small class="text-muted">Debe tener mayúscula, número y símbolo</small>
        </div>

        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-purple">Iniciar Sesión</button>
        </div>

        <div class="text-center extra-links">
            <a href="#">¿Olvidaste tu contraseña?</a><br>
            <span>No tienes cuenta? <a href="registro.html">Regístrate</a></span>
        </div>

    </form>

</div>

<script>
function togglePassword() {
    let input = document.getElementById("password");
    if (input.type === "password") {
        input.type = "text";
        icono.classList.remove("bi-eye");
        icono.classList.add("bi-eye-slash");
    } else {
        input.type = "password";
        icono.classList.remove("bi-eye-slash");
        icono.classList.add("bi-eye");
    }
}
</script>
<script src="/cositas/Asesorias/resources/JS/login.js" defer></script>

</body>
</html>
